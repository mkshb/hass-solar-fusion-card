name: Validate HACS

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Re-validate weekly to catch upstream HACS requirement changes
    - cron: "0 6 * * 1"

jobs:
  validate:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: plugin
