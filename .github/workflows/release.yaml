name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  hacs-validate:
    uses: ./.github/workflows/hacs-validate.yaml
    
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release zip
        run: |
          cd dist
          zip -r ../solar-fusion-card.zip solar-fusion-card.js locales/

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: solar-fusion-card.zip
          generate_release_notes: true
